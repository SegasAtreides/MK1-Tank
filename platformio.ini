# Reference:
#https://github.com/pioarduino/platform-espressif32/blob/develop/examples/espidf-arduino-blink/platformio.ini

[platformio]
src_dir = main
default_envs = esp32-s3-devkitc-1

[env]

#platform = https://github.com/pioarduino/platform-espressif32.git#develop
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.21/platform-espressif32.zip
#platform = espressif32
#framework = arduino, espidf
framework = espidf
monitor_speed = 115200
monitor_filters = direct
board_build.embed_txtfiles =
    managed_components/espressif__esp_insights/server_certs/https_server.crt
    managed_components/espressif__esp_rainmaker/server_certs/rmaker_mqtt_server.crt
    managed_components/espressif__esp_rainmaker/server_certs/rmaker_claim_service_server.crt
    managed_components/espressif__esp_rainmaker/server_certs/rmaker_ota_server.crt

[env:esp32dev]
board = esp32dev

[env:esp32-s3-devkitc-1]
board = esp32-s3-devkitc-1
; v0.8.0 Step 0b: PlatformIO's own partitions.bin generation (espidf.py)
; reads board_build.partitions independently of ESP-IDF's sdkconfig
; CONFIG_PARTITION_TABLE_* options - it does NOT fall back to the
; project's custom partition table just because sdkconfig.defaults sets
; CONFIG_PARTITION_TABLE_CUSTOM=y. Without this line PlatformIO silently
; flashes the built-in partitions_singleapp.csv (1MB factory, no
; coredump, no storage partition) instead of partitions.csv at project
; root, even though the ESP-IDF-internal cmake build honors sdkconfig
; correctly. Must be kept in sync with partitions.csv.
board_build.partitions = partitions.csv
; Bugfix (version-string audit): injects MK1_GIT_VERSION from
; `git describe --tags --always --dirty` as a compile-time define - see
; extract_version.py for why. Scoped to this env only (the only one
; actually built/tested - see README's "Building and flashing" section
; on the other declared envs).
extra_scripts = pre:extract_version.py

[env:esp32-c3-devkitc-02]
board = esp32-c3-devkitc-02

[env:esp32-c6-devkitc-1]
board = esp32-c6-devkitc-1

[env:esp32-h2-devkitm-1]
board = esp32-h2-devkitm-1
